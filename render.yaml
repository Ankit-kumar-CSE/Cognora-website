services:
  - type: web
    name: focusguard
    runtime: node
    region: oregon
    plan: free

    buildCommand: npm install && npm install --prefix Frontend && npm run build --prefix Frontend && npm install --prefix Backend --omit=dev

    startCommand: node Backend/index.js

    envVars:
      - key: NODE_ENV
        value: production

      # TODO: Uncomment and fill in once your installers are uploaded
      # - key: DOWNLOAD_WIN_URL
      #   value: https://github.com/<your-username>/focusguard/releases/download/v1.0.0/FocusGuard-Setup.exe
      # - key: DOWNLOAD_MAC_URL
      #   value: https://github.com/<your-username>/focusguard/releases/download/v1.0.0/FocusGuard.dmg

    healthCheckPath: /api/health